<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tab Cannon" />
  <meta name="theme-color" content="#007aff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <title>Tab Cannon</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --muted: #8e8e93;
      --border: #d1d1d6;
      --accent: #007aff;
      --accent-pressed: #0062cc;
      --btn-bg: #e5e5ea;
      --btn-bg-pressed: #d1d1d6;
      --btn-text: #1c1c1e;
      --danger: #ff3b30;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --text: #f2f2f7;
        --muted: #8e8e93;
        --border: #38383a;
        --accent: #0a84ff;
        --accent-pressed: #0060d0;
        --btn-bg: #2c2c2e;
        --btn-bg-pressed: #3a3a3c;
        --btn-text: #f2f2f7;
        --danger: #ff453a;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 16px 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    p.hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 16px;
      line-height: 1.4;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 16px 4px 6px;
    }
    input[type="text"], textarea {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea {
      flex: 1;
      min-height: 160px;
      resize: none;
      overflow-y: auto;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 16px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: var(--btn-bg-pressed); }
    .footer {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 12px 0 calc(env(safe-area-inset-bottom) + 12px);
      margin-top: 12px;
      z-index: 10;
    }
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }
    code.placeholder {
      background: var(--border);
      color: var(--text);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tab Cannon</h1>

    <label for="term">Begriff</label>
    <input
      id="term"
      type="text"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
      placeholder="z. B. claude"
    />

    <label for="urls">URLs (eine pro Zeile)</label>
    <textarea
      id="urls"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
      placeholder="https://www.google.com/search?q={begriff}&#10;https://duckduckgo.com/?q={begriff}&#10;https://de.wikipedia.org/wiki/{begriff}"
    ></textarea>

    <div class="footer">
      <div class="error" id="error"></div>
      <button class="btn" id="openViaShortcut">Alle Öffnen</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "link-opener-state-v1";

    const termEl = document.getElementById("term");
    const urlsEl = document.getElementById("urls");
    const shortcutBtn = document.getElementById("openViaShortcut");
    const errorEl = document.getElementById("error");

    const DEFAULT_SHORTCUT = "URLs öffnen";

    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (saved.term) termEl.value = saved.term;
      if (saved.urls) urlsEl.value = saved.urls;
    } catch {}

    const persist = () => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          term: termEl.value,
          urls: urlsEl.value,
        }));
      } catch {}
    };
    termEl.addEventListener("input", persist);
    urlsEl.addEventListener("input", persist);

    const substitute = (template, term) => {
      const encoded = encodeURIComponent(term);
      return template
        .replaceAll("{begriff}", encoded)
        .replaceAll("{BEGRIFF}", encoded)
        .replaceAll("{roh}", term);
    };

    const buildLinks = () => {
      const term = termEl.value.trim();
      const lines = urlsEl.value
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(Boolean);
      return lines.map(line => substitute(line, term));
    };

    shortcutBtn.addEventListener("click", () => {
      errorEl.textContent = "";
      const term = termEl.value.trim();
      if (!term) {
        errorEl.textContent = "Bitte Begriff eingeben.";
        return;
      }
      const links = buildLinks();
      if (links.length === 0) {
        errorEl.textContent = "Bitte mindestens eine URL eingeben.";
        return;
      }

      const payload = links.join("\n");
      const url =
        "shortcuts://run-shortcut" +
        "?name=" + encodeURIComponent(DEFAULT_SHORTCUT) +
        "&input=text" +
        "&text=" + encodeURIComponent(payload);
      window.location.href = url;
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
